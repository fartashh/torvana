name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite client bundle)
        run: ./node_modules/.bin/vite build

      - name: Build (Vite SSR bundle)
        run: ./node_modules/.bin/vite build --ssr src/entry-server.jsx --outDir .server

      - name: Pre-render all routes
        run: node prerender.js

      - name: Verify prerender output
        run: |
          echo "--- Checking dist/index.html for homepage content ---"
          grep -q "How can we help" dist/index.html || (echo "FAIL: homepage content missing from dist/index.html" && exit 1)
          echo "PASS: dist/index.html contains homepage content"
          echo ""
          echo "--- Checking dist/garbage/index.html for article content ---"
          grep -q "Service Overview" dist/garbage/index.html || (echo "FAIL: article content missing from dist/garbage/index.html" && exit 1)
          echo "PASS: dist/garbage/index.html contains article content"
          echo ""
          echo "--- Checking dist/311/index.html exists ---"
          test -f dist/311/index.html || (echo "FAIL: dist/311/index.html not found" && exit 1)
          echo "PASS: dist/311/index.html exists"
          echo ""
          echo "--- CSS asset path check ---"
          grep -q '/torvana/assets/' dist/index.html || (echo "FAIL: CSS path missing from dist/index.html" && exit 1)
          echo "PASS: CSS asset paths are correct"

      - name: Generate SEO files
        run: node generate-seo.js
        env:
          SITE_URL: 'https://fartashh.github.io/torvana'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
