name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: ./node_modules/.bin/vite build

      - name: Generate SEO files
        run: node generate-seo.js
        env:
          SITE_URL: 'https://fartashh.github.io/torvana'

      - name: Copy static HTML pages into dist/
        run: |
          echo "Copying static-pages/ into dist/..."
          cp -r static-pages/. dist/
          echo "Done. Listing dist/:"
          find dist -name "index.html" | sort

      - name: Verify homepage content
        run: |
          echo "--- Verifying dist/index.html has real content ---"
          grep -q "How can we help" dist/index.html \
            && echo "PASS: homepage content found" \
            || (echo "FAIL: homepage content missing" && exit 1)

          echo "--- Verifying dist/311/index.html exists ---"
          test -f dist/311/index.html \
            && echo "PASS: 311 page exists" \
            || (echo "FAIL: 311 page missing" && exit 1)

          echo "--- Verifying dist/divisions/index.html exists ---"
          test -f dist/divisions/index.html \
            && echo "PASS: divisions page exists" \
            || (echo "FAIL: divisions page missing" && exit 1)

          echo "--- Verifying dist/contact/index.html exists ---"
          test -f dist/contact/index.html \
            && echo "PASS: contact page exists" \
            || (echo "FAIL: contact page missing" && exit 1)

          echo "--- Verifying CSS asset was built ---"
          test -f dist/assets/index.css \
            && echo "PASS: CSS asset exists" \
            || (echo "FAIL: CSS asset missing" && exit 1)

          echo "All checks passed!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
